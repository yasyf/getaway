name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Validate plugin manifests
        run: |
          jq empty .claude-plugin/plugin.json .claude-plugin/marketplace.json
          test "$(jq -r .name .claude-plugin/plugin.json)" = getaway
          test "$(jq -r '.plugins[0].name' .claude-plugin/marketplace.json)" = getaway
      - name: Validate skill frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            dir=$(basename "$(dirname "$f")")
            name=$(sed -n '2,/^---$/p' "$f" | sed -n 's/^name: *//p' | head -1)
            test "$name" = "$dir" || { echo "frontmatter name '$name' != directory '$dir' in $f" >&2; exit 1; }
            sed -n '2,/^---$/p' "$f" | grep -q '^description: ' || { echo "missing description in $f" >&2; exit 1; }
          done
      - name: Validate CLI data files
        run: jq empty cli/getaway/data/*.json

  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Test
        run: uv run --project cli pytest
      - name: Lint
        run: uv run --project cli ruff check cli
      - name: Type-check
        run: uv run --project cli ty check cli

  workflow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test trip workflow
        run: node --test 'tests/workflow/*.test.mjs'

  hooks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Hook inline tests
        run: HOME="$(mktemp -d)" uvx capt-hook --hooks hooks --root "$(mktemp -d)" test --json
      - name: Lint capt-hook pack
        run: uvx 'capt-hook>=9.9.0' pack lint "$GITHUB_WORKSPACE"

  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .claude/components
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Type-check pack
        run: bun run typecheck
      - name: Build pack
        run: bun run build
      - name: Committed bundle matches src
        run: git diff --exit-code -- dist/pack.js
      - name: Smoke built bundle
        run: bun run smoke
      - name: Pack lint
        run: |
          curl -fsSLO https://github.com/yasyf/cc-present/releases/download/v0.10.0/cc-present_linux_amd64
          curl -fsSL https://github.com/yasyf/cc-present/releases/download/v0.10.0/checksums.txt \
            | grep ' cc-present_linux_amd64$' | sha256sum -c -
          chmod +x cc-present_linux_amd64
          ./cc-present_linux_amd64 pack lint .
